# 로컬 전용 PostgreSQL override.
#
# 사용법: 본 파일은 docker-compose 가 자동으로 읽지만, 아래 postgres 서비스는
# `profiles: [test]` 로 게이트되어 있어 명시 호출 시에만 기동된다.
#   docker compose --profile test up -d postgres   → 로컬 캐시-플로우 테스트용
#   docker compose up -d                            → postgres 는 기동 안 됨 (정상)
#
# 운영 docker-compose.yml 의 lostark-rest/lostark-udp 서비스는 외부
# kord-postgres 컨테이너(다른 compose 가 띄움)에 접속하도록 설계되어 있다.
# kord-postgres 가 이미 호스트 5432 를 점유한 환경에서 본 override 의 postgres 가
# 자동 기동되면 포트 충돌이 발생하므로 profile 게이트 필수.
#
# 본 override 는 로컬 단독 캐시-플로우 테스트 (`yarn test:cache-flow`) 를 위한
# 격리된 PostgreSQL 만 추가한다.
#
# `.env` 에서 다음 두 값을 매칭하여 사용한다:
#   DB_HOST=localhost
#   DB_PORT=5432
#   DB_USERNAME=kord
#   DB_PASSWORD=password
#   DB_DATABASE=lostark_cache

services:
  postgres:
    profiles: [test]
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: kord
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lostark_cache
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

volumes:
  postgres_local_data:
