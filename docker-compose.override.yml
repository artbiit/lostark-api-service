# 로컬 전용 PostgreSQL override.
#
# 사용법: 본 파일은 docker-compose 가 자동으로 읽는다 (override 패턴).
#   docker compose up postgres -d  → 이 override 의 postgres 서비스만 기동
#
# 운영 docker-compose.yml 의 lostark-api 서비스는 외부 kord-postgres 컨테이너에
# 접속하도록 설계되어 있다. 본 override 는 로컬 단독 캐시-플로우 테스트
# (`yarn test:cache-flow`) 를 위한 PostgreSQL 만 추가한다.
#
# `.env` 에서 다음 두 값을 매칭하여 사용한다:
#   DB_HOST=localhost
#   DB_PORT=5432
#   DB_USERNAME=kord
#   DB_PASSWORD=password
#   DB_DATABASE=lostark_cache

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: kord
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lostark_cache
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

volumes:
  postgres_local_data:
