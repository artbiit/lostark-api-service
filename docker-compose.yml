# 운영/로컬 공용 compose.
# - lostark-rest: HTTP REST API (TCP 3000)
# - lostark-udp:  UDP gateway / 카카오톡 명령 봇 (UDP 3001)
# 두 서비스는 동일 image 를 공유하고 command 로 워크스페이스만 분기한다.
# 이미지는 lostark-rest 가 build, lostark-udp 는 image 재사용.
#
# 외부 의존 인프라(같은 docker host 의 다른 compose 가 띄우는 것):
#   - kord-redis (network: kord_default, hostname: kord-redis, port: 6379)
#   - kord-postgres (network: kord_default, hostname: kord-postgres, port: 5432)
# 운영서버에서는 동일 이름/네트워크로 구성하거나, 아래 env 의 CACHE_REDIS_URL /
# DB_HOST 를 .env 로 override.
#
# 로컬에 kord-postgres 가 없으면 docker-compose.override.yml 의 postgres 서비스를
# 함께 띄우고 DB_HOST=postgres 로 override.

x-lostark-env: &lostark-env
  NODE_ENV: production
  CACHE_REDIS_URL: ${CACHE_REDIS_URL:-redis://kord-redis:6379}
  DB_HOST: ${DB_HOST:-kord-postgres}
  DB_PORT: ${DB_PORT:-5432}
  DB_USERNAME: ${DB_USERNAME:-kord}
  DB_PASSWORD: ${DB_PASSWORD:-password}
  DB_DATABASE: ${DB_DATABASE:-lostark_cache}
  LOSTARK_API_KEY: ${LOSTARK_API_KEY}

services:
  lostark-rest:
    build: .
    image: lostark-api-service:local
    command: ['yarn', 'workspace', '@lostark/rest-api', 'start']
    ports:
      - '3000:3000' # REST Service (TCP)
    environment:
      <<: *lostark-env
      REST_SERVER_HOST: 0.0.0.0
      REST_SERVER_PORT: 3000
    networks:
      - default
      - kord_default
    restart: unless-stopped

  lostark-udp:
    image: lostark-api-service:local
    command: ['yarn', 'workspace', '@lostark/udp-gateway', 'start']
    ports:
      - '3001:3001/udp' # UDP Gateway (메신저봇R 클라이언트 수신)
    environment:
      <<: *lostark-env
      UDP_GATEWAY_HOST: 0.0.0.0
      UDP_GATEWAY_PORT: 3001
    depends_on:
      - lostark-rest
    networks:
      - default
      - kord_default
    restart: unless-stopped

networks:
  kord_default:
    external: true
