version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  lostark-api:
    build: .
    ports:
      - "3000:3000"  # REST Service
      - "3001:3001"  # UDP Service
    environment:
      - NODE_ENV=production
      - CACHE_REDIS_URL=redis://redis:6379
      - DB_HOST=kord-postgres
      - DB_PORT=5432
      - DB_USERNAME=kord
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DATABASE=lostark_cache
      - LOSTARK_API_KEY=${LOSTARK_API_KEY}
    networks:
      - default
      - kord_default
    restart: unless-stopped

volumes:
  redis_data:

networks:
  kord_default:
    external: true
